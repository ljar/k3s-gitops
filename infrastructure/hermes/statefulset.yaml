---
# StatefulSet — single pod, two containers (gateway + dashboard sidecar).
# Pinned to node 3 via nodeSelector label applied in pre-flight steps.
# Longhorn PVC backs /opt/data for persistent memory, skills, and config.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/version: "0.16.0"
spec:
  serviceName: hermes
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      serviceAccountName: hermes

      # ── Pin to node 3 ──────────────────────────────────────────────────────
      nodeSelector:
        homelab/workload: agents   # apply with: kubectl label node <node3> homelab/workload=agents

      # ── ACR pull secret ────────────────────────────────────────────────────
      imagePullSecrets:
        - name: acr-secret

      # ── CSI volume needed to hydrate the secretObjects K8s Secret ──────────
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: hermes-keyvault
            nodePublishSecretRef:
              name: akv-sp-credentials

      # ── init: wait for Secret to exist before starting main containers ─────
      initContainers:
        - name: secret-hydrate
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for hermes-secrets to be created by CSI driver..."
              until [ -f /mnt/secrets-store/hermes-telegram-token ]; do
                sleep 2
              done
              echo "Secrets mounted. Proceeding."
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true

      containers:
        # ── Gateway (primary) ───────────────────────────────────────────────
        - name: gateway
          image: lucasrosedotnet.azurecr.io/hermes-agent:latest
          imagePullPolicy: Always
          command: ["/opt/hermes/.venv/bin/hermes"]
          args: ["gateway", "run"]

          env:
            # ── Model provider ────────────────────────────────────────────
            # Nous Portal (recommended — covers models, web search, image gen):
            - name: NOUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: NOUS_API_KEY
            # Or swap for ANTHROPIC_API_KEY / OPENAI_API_KEY etc.

            # ── Messaging gateway ─────────────────────────────────────────
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: TELEGRAM_BOT_TOKEN

            # ── Azure service principal (for az CLI DevOps work) ──────────
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: AZURE_CLIENT_ID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: AZURE_CLIENT_SECRET
            - name: AZURE_TENANT_ID
              value: "45511914-1da0-4e4e-b3ee-1780141d3fc7"              # non-secret, fill in directly
            - name: AZURE_SUBSCRIPTION_ID
              value: "3fcd60ac-b447-4b17-affa-437c415e622a"        # az account show --query id -o tsv

            # ── GitHub PAT (for gh CLI / Actions triggers) ────────────────
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: GH_TOKEN

            # ── Hermes runtime ────────────────────────────────────────────
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "0"
            - name: HERMES_GID
              value: "0"

          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: secrets-store        # must be mounted to trigger secretObjects hydration
              mountPath: /mnt/secrets-store
              readOnly: true

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "3Gi"

          livenessProbe:
            exec:
              command: ["pgrep", "-f", "gateway"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

        # ── Dashboard (sidecar) ─────────────────────────────────────────────
        - name: dashboard
          image: lucasrosedotnet.azurecr.io/hermes-agent:latest
          imagePullPolicy: Always
          command: ["/opt/hermes/.venv/bin/hermes"]
          args: ["dashboard", "--host", "0.0.0.0", "--no-open"]

          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "0"
            - name: HERMES_GID
              value: "0"

          ports:
            - name: dashboard
              containerPort: 9119
              protocol: TCP

          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

  # ── Longhorn persistent volume ──────────────────────────────────────────────
  volumeClaimTemplates:
    - metadata:
        name: hermes-data
        labels:
          app.kubernetes.io/name: hermes
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
