---
# SecretProviderClass — pulls secrets from Azure Key Vault via the
# akvsecretsprovider Arc extension (secrets-store.csi.k8s.io driver).
#
# Prerequisites:
#   az k8s-extension create \
#     --cluster-name MyK3sCluster \
#     --resource-group MyK3sHomeLab \
#     --cluster-type connectedClusters \
#     --name akvsecretsprovider \
#     --extension-type Microsoft.AzureKeyVaultSecretsProvider \
#     --configuration-settings enableSecretRotation=true rotationPollInterval=2m
#
# Fill in: <kv-name>, <tenant-id>, and optionally <managed-identity-client-id>
# Get tenant ID:  az account show --query tenantId -o tsv
# Get Arc MSI:    az connectedk8s show -n MyK3sCluster -g MyK3sHomeLab --query identity
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: hermes-keyvault
  namespace: hermes
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"     # use Arc cluster's system-assigned managed identity
    userAssignedIdentityID: ""        # leave empty for system-assigned; set client-id for user-assigned
    keyvaultName: "lucasrose-kv"         # e.g. "myhomelabkv"
    tenantId: "45511914-1da0-4e4e-b3ee-1780141d3fc7"           # az account show --query tenantId -o tsv
    objects: |
      array:
        - |
          objectName: hermes-telegram-token
          objectType: secret
        - |
          objectName: hermes-nous-api-key
          objectType: secret
        - |
          objectName: hermes-az-sp-client-id
          objectType: secret
        - |
          objectName: hermes-az-sp-client-secret
          objectType: secret
        - |
          objectName: hermes-gh-pat
          objectType: secret
  # Mirror KV secrets as a native Kubernetes Secret so containers
  # can consume them as env vars without a CSI volume mount on every pod.
  secretObjects:
    - secretName: hermes-secrets
      type: Opaque
      data:
        - objectName: hermes-telegram-token
          key: TELEGRAM_BOT_TOKEN
        - objectName: hermes-nous-api-key
          key: NOUS_API_KEY
        - objectName: hermes-az-sp-client-id
          key: AZURE_CLIENT_ID
        - objectName: hermes-az-sp-client-secret
          key: AZURE_CLIENT_SECRET
        - objectName: hermes-gh-pat
          key: GH_TOKEN
